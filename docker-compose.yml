services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app/backend
    volumes:
      # Mount source for Django autoreload during development
      - ./backend:/app/backend
      - ./engine:/app/engine
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A optiroute_config worker --loglevel=info
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - ./engine:/app/engine
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  redis_data:

# Dev workflow:
#   1. cp .env.example .env  (fill in SECRET_KEY and GOOGLE_MAPS_API_KEY)
#   2. docker compose up --build
#   3. Django/Python changes auto-reload via volume mounts
#   4. C++ changes require manual rebuild (see Dockerfile comments), then: docker compose restart worker
